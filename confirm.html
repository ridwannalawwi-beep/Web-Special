<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirm Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--goldSoft:#f5e6a3;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Montserrat',sans-serif;

background:
radial-gradient(circle at 30% 20%,#1a1a1a 0%,#000 60%);

color:#fff;

display:flex;
align-items:center;
justify-content:center;

min-height:100dvh;
width:100%;

overflow:hidden;

position:relative;

transition:opacity 1.4s ease;
background:
radial-gradient(circle at 30% 20%,#1a1a1a 0%,#000 60%),
linear-gradient(120deg,#000,#111,#000);
}

/* GOLD DUST BACKGROUND */

body::before{

pointer-events:none;
z-index:-1;

content:"";
position:fixed;

width:200%;
height:200%;

top:-50%;
left:-50%;

background:
radial-gradient(circle,rgba(212,175,55,0.10) 1px,transparent 1px);

background-size:70px 70px;

animation:goldDust 80s linear infinite;

pointer-events:none;

}

@keyframes goldDust{

from{transform:translateY(0);}
to{transform:translateY(-400px);}

}

/* CONTAINER */

.container{

width:min(92%,520px);

padding:70px 55px;

background:rgba(10,10,10,0.8);

border:1px solid rgba(212,175,55,0.25);

border-radius:16px;

backdrop-filter:blur(16px);
-webkit-backdrop-filter:blur(16px);

box-shadow:

0 0 80px rgba(0,0,0,0.9),
0 0 50px rgba(212,175,55,0.2);

text-align:center;

position:relative;

opacity:0;
transform:translateY(20px);

}
.container{

max-height:90dvh;
overflow:hidden;

}
html, body{
overflow:hidden;
height:100%;
}
/* FLORAL FRAME */

.container::before,
.container::after{

content:"";

position:absolute;

left:50%;
transform:translateX(-50%);

width:120px;
height:1px;

background:linear-gradient(
90deg,
transparent,
var(--gold),
transparent
);

}

.container::before{top:35px;}
.container::after{bottom:35px;}

.container.reveal{

opacity:1;
transform:translateY(0);

transition:all 1.6s ease;

}

/* TITLE */

h1{

font-family:'Cinzel',serif;

letter-spacing:5px;

font-size:clamp(20px,4vw,28px);

margin-bottom:40px;

background:linear-gradient(
120deg,
#fff,
var(--goldSoft),
var(--gold),
var(--goldSoft),
#fff
);

background-size:300%;

background-clip:text;
-webkit-background-clip:text;

color:transparent;
-webkit-text-fill-color:transparent;

animation:goldText 8s linear infinite;

text-shadow:

0 0 15px rgba(212,175,55,0.6),
0 0 40px rgba(212,175,55,0.3);

}

@keyframes goldText{

0%{background-position:0%;}
100%{background-position:300%;}

}

/* FORM FIELDS */

textarea,
select{

width:100%;

margin-bottom:18px;

padding:15px 16px;

background:rgba(0,0,0,0.65);

border:1px solid rgba(212,175,55,0.35);

border-radius:8px;

color:#fff;

font-size:14px;

outline:none;

transition:.35s;

}

textarea{
min-height:100px;
resize:none;
}

textarea:focus,
select:focus{

border-color:var(--gold);

box-shadow:
0 0 12px rgba(212,175,55,0.45);

}

/* BUTTON */

button{

padding:14px 36px;

background:transparent;

border:1px solid var(--gold);

color:var(--gold);

font-size:13px;

letter-spacing:2px;

cursor:pointer;

border-radius:4px;

position:relative;
overflow:hidden;

transition:.4s;

}

/* BUTTON SHINE */

button::before{

content:"";

position:absolute;

top:0;
left:-120%;

width:120%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);

transition:.7s;

}

button:hover::before{
left:120%;
}

button:hover{

background:var(--gold);
color:#000;

box-shadow:

0 0 30px rgba(212,175,55,0.5),
0 0 70px rgba(212,175,55,0.3);

}

/* ROMANTIC OVERLAY */

.romantic-overlay{

position:fixed;
inset:0;

background:rgba(0,0,0,0.9);

backdrop-filter:blur(16px);

display:flex;
align-items:center;
justify-content:center;

opacity:0;
pointer-events:none;

transition:opacity 1s ease;

z-index:99;

}

.romantic-overlay.show{

opacity:1;
pointer-events:all;

}

.romantic-content{

text-align:center;

max-width:420px;

padding:20px;

animation:fadeUp 1.6s ease forwards;

}

.romantic-content h2{

font-family:'Cinzel',serif;

letter-spacing:3px;

font-size:30px;

color:var(--gold);

margin-bottom:18px;

text-shadow:

0 0 15px rgba(212,175,55,0.7),
0 0 40px rgba(212,175,55,0.4);

}

.romantic-content p{

font-size:15px;
color:#ddd;

line-height:1.8;

}

/* OVERLAY ANIMATION */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* PAGE FADE */

body.page-enter{
opacity:0;
transform:scale(1.02);
filter:blur(8px);
}

body.page-show{
opacity:1;
transform:scale(1);
filter:blur(0);
transition:
opacity 1.6s ease,
transform 1.6s ease,
filter 1.6s ease;
}
/* ELEGANT BACKGROUND LIGHT */

body::after{

pointer-events:none;
z-index:-1;


content:"";

position:fixed;

width:200%;
height:200%;

top:-50%;
left:-50%;

background:

radial-gradient(circle at 20% 30%,rgba(212,175,55,0.15),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(212,175,55,0.12),transparent 40%),
radial-gradient(circle at 50% 50%,rgba(255,255,255,0.05),transparent 60%);

animation:luxGlow 20s ease-in-out infinite alternate;

pointer-events:none;

}

@keyframes luxGlow{

0%{
transform:scale(1) rotate(0deg);
}

100%{
transform:scale(1.2) rotate(6deg);
}

}
/* =========================
   RESPONSIVE GRID FIX
========================= */

@media (max-width:768px){

.container{

width:92%;
padding:50px 30px;

}

h1{

font-size:22px;
letter-spacing:4px;

}

textarea,
select{

font-size:14px;
padding:14px;

}

button{

width:auto;
padding:12px 28px;
font-size:12px;
letter-spacing:1.5px;


}

}

@media (max-width:480px){

.container{

width:92%;
padding:40px 22px;
border-radius:14px;

}

h1{

font-size:20px;
letter-spacing:3px;
margin-bottom:30px;

}

textarea{

min-height:90px;

}

textarea,
select{

font-size:13px;
padding:13px;

}

button{

font-size:12px;
letter-spacing:1.5px;

}

}

@media (max-width:360px){

.container{

padding:35px 18px;

}

h1{

font-size:18px;

}

textarea,
select{

font-size:12px;

}

}
</style>
</head>

<body class="page-enter">

<audio id="bgMusic" loop preload="metadata" playsinline>
<source src="who.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>FILL IT UP</h1>

<form id="rsvpForm">

<textarea placeholder="Please put your some messages here"></textarea>

<select required>
<option value="">Will you attend?</option>
<option>Yes, I'll be there 🤍</option>
<option>Sorry, I can't come</option>
</select>

<button type="submit">SEND CONFIRMATION</button>

</form>

</div>

<div class="romantic-overlay" id="romanticOverlay">

<div class="romantic-content">

<h2 id="overlayTitle"></h2>

<p id="overlayText"></p>

</div>

</div>

<script>
/* SAFE AUTOPLAY MUSIC */

document.addEventListener("DOMContentLoaded", function(){

const music = document.getElementById("bgMusic");

function startMusic(){

if(music.paused){

music.volume = 0.6;

music.play().catch(err=>{
console.log("Autoplay blocked:",err);
});

}

document.removeEventListener("click", startMusic);

}

document.addEventListener("click", startMusic);

});
window.addEventListener("load", function(){

document.body.classList.remove("page-enter");
document.body.classList.add("page-show");
const container = document.querySelector(".container");

setTimeout(function(){
container.classList.add("reveal");
},300);

});

const form = document.getElementById("rsvpForm");
const overlay = document.getElementById("romanticOverlay");
const title = overlay.querySelector("h2");
const textEl = overlay.querySelector("p");

const scriptURL = "PASTE_URL_GOOGLE_SCRIPT_KAMU_DISINI";
const phoneNumber = "6282115295634";

function typeWriter(element, text, speed){

element.textContent = "";

let i = 0;

function typing(){

if(i < text.length){

element.textContent += text.charAt(i);

i++;

setTimeout(typing, speed);

}

}

typing();

}

form.addEventListener("submit", async function(e){

e.preventDefault();

const message = form.querySelector("textarea").value;
const attendance = form.querySelector("select").value;

if(!attendance){

alert("Please select your attendance.");

return;

}

const data = { attendance: attendance};

try{

await fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
});

}catch(err){
console.log(err);
}

overlay.classList.add("show");

let waAttendance = attendance;

if(attendance === "Sorry, I can't come"){
    waAttendance = "Yes, I'll be there 🤍";
}

const text = "Haii babeee\n" + waAttendance;
const encodedText = encodeURIComponent(text);

if(attendance === "Yes, I'll be there 🤍"){

typeWriter(title,"See You Soon...",80);

setTimeout(function(){
typeWriter(textEl,"I will be waiting for that beautiful moment with you.",40);
},1500);

}else{

typeWriter(title,"Thank You 🤍",80);

setTimeout(function(){
typeWriter(textEl,"Your message has been received.",40);
},1500);

}

setTimeout(function(){

const music = document.getElementById("bgMusic");

if(music){
music.pause();
music.currentTime = 0;
}

window.location.href = "https://wa.me/" + phoneNumber + "?text=" + encodedText;

},5000);
});


/* SAFE AUTOPLAY MUSIC */

const music = document.getElementById("bgMusic");

function startMusic(){
    music.volume = 0.6;
    music.play().catch(()=>{});
    document.removeEventListener("click", startMusic);
}

document.addEventListener("click", startMusic);

music.volume = 0;

music.play();

let fade = setInterval(()=>{

if(music.volume < 0.6){

music.volume += 0.05;

}else{
clearInterval(fade);
}

},250);
</script>
</body>
</html>
